<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приглашение</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #91c6f2 50%, #f7a8c6 50%);
            padding: 40px;
            color: #333;
        }
        .card {
            background: white;
            max-width: 600px;
            margin: auto;
            border: 2px solid #91c6f2;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .info {
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">🎉 Приглашение на гендер-пати 🎉</div>
    <div class="info">
        👤 Имя: <strong id="user-name"></strong><br>
        🤔 Предположение: <strong id="user-guess"></strong><br>
        📅 Дата: <strong>3 мая</strong><br>
        📍 Место: <strong>Банкетный зал Voyage</strong><br><br>
        Павел и Анита ждут тебя! 💖💙
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('user-name').textContent = params.get('name') || 'Гость';
    document.getElementById('user-guess').textContent = params.get('guess') || '-';
</script>
</body>
</html>
