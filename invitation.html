<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приглашение</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #91c6f2 50%, #f7a8c6 50%);
            padding: 40px;
            color: #333;
        }
        .card {
            background: white;
            max-width: 650px;
            margin: auto;
            border: 2px solid #91c6f2;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            width: 650px;
            height: 500px;
        }
        .title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }
        .info {
            font-size: 28px;
            line-height: 1.6;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="title">🎉 Приглашение на гендер-пати 🎉</div>
    <div class="info">
        👤 Имя: <strong id="user-name"></strong><br>
        🤔 Предположение: <strong id="user-guess"></strong><br>
        📅 Дата: <strong>3 мая</strong><br>
        ⌚ Время: <strong>17:00</strong><br>
        📍 Место: <strong>Банкетный зал Voyage (ул. Донентаева 3а)</strong><br><br>
        <strong>Павел</strong> и <strong>Анита</strong> ждут тебя! 💖💙<br><br>

        <strong>Сделай 📷скриншот, чтобы сохранить!</strong>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('user-name').textContent = params.get('name') || 'Гость';
    document.getElementById('user-guess').textContent = params.get('guess') || '-';
</script>
</body>
</html>
